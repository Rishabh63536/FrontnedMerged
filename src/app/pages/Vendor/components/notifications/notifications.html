<div class="container py-4" style="max-width: 720px;">
  <h1 class="text-primary fw-bold mb-4">Notifications</h1>

  @if (loading) {
    <div class="d-flex justify-content-center py-5">
      <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading…</span></div>
    </div>
  } @else if (notifications.length === 0) {
    <div class="alert alert-light border text-center">No notifications yet.</div>
  } @else {
    <div class="list-group">
      @for (n of notifications; track n.id) {
        <div class="list-group-item" [class.bg-teal-tint]="!n.read" style="cursor: pointer;" (click)="markAsRead(n)">
          <div class="d-flex justify-content-between align-items-start">
            <div>
              <p class="mb-1" [class.fw-bold]="!n.read">{{ n.message }}</p>
              <p class="text-secondary small mb-0">{{ n.createdAt | date: 'medium' }}</p>
            </div>
            @if (!n.read) { <span class="badge bg-primary">New</span> }
          </div>
        </div>
      }
    </div>
  }
</div>
